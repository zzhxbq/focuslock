name: Build APK

# 触发条件：推送到 main 分支、提交 Pull Request，或在 Actions 页手动点击运行
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 允许创建 Release

    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: 安装 Gradle 8.5
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: 编译 Debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: 给 APK 重命名（带时间戳）
        run: |
          mkdir -p output
          cp app/build/outputs/apk/debug/*.apk output/FocusLock-$(date +%Y%m%d-%H%M).apk
          ls -la output/

      - name: 发布为公开 Release（任何人点链接即可下载，无需登录）
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0-${{ github.run_number }}
          name: 专注锁机 Build ${{ github.run_number }}
          body: |
            自动构建版本

            下载下方 FocusLock-*.apk 安装即可。
            安装前请先在手机设置里允许「未知来源应用」。

            首次打开 App 后请到「权限设置」逐项开启：
            1. 无障碍服务
            2. 使用情况访问
            3. 通知权限
          files: output/*.apk
          prerelease: false
          make_latest: true
